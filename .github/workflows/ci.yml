name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # La config ruff vit dans pyproject.toml ([tool.ruff]) — même source que
      # pre-commit. Version épinglée pour rester aligné avec le hook local.
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.15"
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.15"
          args: "format --check"

  test:
    name: Odoo 19 test suite
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install module and run tests on Odoo 19
        # The official odoo image entrypoint builds the --db_* flags from the
        # HOST/PORT/USER/PASSWORD env vars and appends them after the command,
        # so the DB connection must be configured through these vars.
        run: |
          docker run --rm --network host \
            -e HOST=127.0.0.1 -e PORT=5432 -e USER=odoo -e PASSWORD=odoo \
            -v "${{ github.workspace }}:/mnt/extra-addons/souscriptions_odoo:ro" \
            odoo:19 odoo \
              --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons \
              -d ci_test -i souscriptions_odoo \
              --test-enable --test-tags /souscriptions_odoo \
              --stop-after-init --log-level=test
